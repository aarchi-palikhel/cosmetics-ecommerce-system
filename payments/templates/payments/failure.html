{% extends 'accounts/base.html' %}
{% block title %}Payment Failed{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center p-8">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-10 text-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Payment Failed</h2>
        <p class="text-gray-500 mt-2">Your payment was not completed. Please try again.</p>
        <div class="flex gap-3 justify-center mt-6">
            <a href="{% url 'cart_detail' %}"
                class="bg-gradient-to-r from-purple-500 to-purple-700 text-white px-6 py-3 rounded-xl font-semibold hover:opacity-90 transition">
                Back to Cart
            </a>
            <a href="{% url 'product_list' %}"
                class="border border-gray-300 text-gray-600 px-6 py-3 rounded-xl hover:bg-gray-50 transition">
                Browse Products
            </a>
        </div>
    </div>
</div>
{% endblock %}
